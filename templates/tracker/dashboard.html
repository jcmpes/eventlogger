{% extends "base.html" %}

{% block content %}

    <div class="max-w-xl mx-auto px-2 space-y-6">

        <!-- BIG LOG BUTTON -->
        <div class="text-center">

            <button
                hx-post="{% url 'log' %}"
                hx-trigger="click"
                hx-swap="none"
                id="btn-log-event"
                class="btn btn-primary w-full h-36 text-5xl font-bold shadow-xl active:scale-95 transition"
            >
                LOG
            </button>

            <p
                id="last-event"
                class="mt-3 text-lg opacity-70"
                data-last="{{ last_event_ts|default:'' }}"
            >
                Último evento: {{ last_event }}
            </p>

        </div>


        <!-- CHART -->
        <div class="card bg-base-100 shadow">

            <div class="card-body">

                <h2 class="font-semibold">
                    Eventos última hora
                </h2>

                <div
                    id="chart-container"
                    hx-get="{% url 'chart' %}"
                    hx-trigger="load, every 60s, eventLogged from:body, eventUndo from:body, eventRedo from:body"
                    hx-swap="innerHTML"
                    class="h-64"
                >
                </div>

            </div>

        </div>


        <!-- UNDO REDO -->
        <div class="grid grid-cols-2 gap-4">

            <button
                hx-post="{% url 'undo' %}"
                hx-swap="none"
                id="btn-undo"
                class="btn btn-warning h-16 text-lg"
            >
                Undo
            </button>

            <button
                hx-post="{% url 'redo' %}"
                hx-swap="none"
                id="btn-redo"
                class="btn btn-success h-16 text-lg"
            >
                Redo
            </button>

        </div>


        <!-- TABLE -->
        <div class="card bg-base-100 shadow">

            <div class="card-body">

                <h2 class="font-semibold">
                    Últimos eventos
                </h2>

                <div
                    hx-get="{% url 'events_table' %}"
                    hx-trigger="load, eventLogged from:body, eventUndo from:body, eventRedo from:body"
                    hx-swap="innerHTML"
                ></div>

            </div>

        </div>

    </div>

{% endblock %}
