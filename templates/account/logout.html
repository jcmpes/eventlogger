{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-sm">

        <div class="card bg-base-100 shadow-xl">
            <div class="card-body items-center text-center gap-4 py-10">

                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-warning/20 mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                </div>

                <h2 class="text-2xl font-bold">¿Cerrar sesión?</h2>
                <p class="text-base-content/50">Tu sesión se cerrará en este dispositivo.</p>

                <form method="post" class="w-full mt-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-warning w-full text-base">
                        Cerrar sesión
                    </button>
                </form>

                <a href="/" class="btn btn-ghost btn-sm w-full">
                    Cancelar
                </a>

            </div>
        </div>

    </div>
</div>
{% endblock %}
